name: CI

# Schützt main vor unbemerkten Type-/Lint-Fehlern — der Next-Build ignoriert
# diese (ignoreBuildErrors/ignoreDuringBuilds), daher prüft die CI sie explizit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-Check (tsc --noEmit)
        run: npm run typecheck
      - name: Lint
        run: npm run lint
